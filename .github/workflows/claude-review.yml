name: AI Code Review

on:
  # PR 创建/更新时双 AI 并行自动审查
  pull_request:
    types: [opened, synchronize]

  # 评论里 @claude 或 @codex 触发交互式操作
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── 1. Claude 自动审查（需要 ANTHROPIC_API_KEY secret） ──────────────
  claude-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            审查这个 PR，重点检查：
            1. preflight check 是否完整（三阶段验证：命令存在 → 是真实二进制 → 支持 -p/--model）
            2. shell 调用是否使用 heredoc 变量，无字符串拼接
            3. 插件指令中是否出现 rm / del / Remove-Item 等删除命令
            4. 是否有硬编码凭据或内网地址
            5. agent 在依赖不可用时是否 fail fast，而不是静默 fallback

            以中文发布 review comment，按严重程度排序发现。
          claude_args: "--max-turns 5"

  # ── 2. Codex 自动审查（需要 OPENAI_API_KEY secret） ─────────────────
  codex-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 获取 PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Codex 审查
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr.diff)
          PROMPT="你是一个对抗式代码审查员，专门找变更中不应上线的理由。

          审查以下 diff，重点关注：
          - shell 注入风险（字符串拼接调用命令）
          - 错误处理缺失（静默 fallback、无 fail fast）
          - 凭据或路径硬编码
          - 插件中的危险命令（rm/del/Remove-Item）

          输出格式：
          ## Codex 审查结论: [PASS | NEEDS-ATTENTION | BLOCK]
          ### 发现（按严重程度）
          每条包含：文件:行号、问题、影响、建议
          ### 总结

          diff 内容：
          $DIFF"

          npx --yes @openai/codex -p "$PROMPT" --model o4-mini --quiet 2>&1 | tee /tmp/codex-review.txt

      - name: 发布 Codex review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/codex-review.txt', 'utf8');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `### 🤖 Codex Review\n\n${review}`,
              event: 'COMMENT'
            });

  # ── 3. @claude 召唤（交互式，可直接改代码） ────────────────────────
  claude-interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 10"
